<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MF勤怠 → IR指定勤務表 転記ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 40px; background-color: #f0f4f8; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        h1 { font-size: 22px; color: #1e3a8a; text-align: center; margin-bottom: 30px; border-bottom: 2px solid #3b82f6; padding-bottom: 15px; }
        .step-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 20px; position: relative; }
        .step-num { position: absolute; top: -12px; left: 15px; background: #3b82f6; color: #fff; font-weight: bold; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #475569; font-size: 14px; }
        input[type="file"] { width: 100%; box-sizing: border-box; padding: 10px; background: #fff; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; }
        .btn-run { display: block; width: 100%; background: #10b981; color: #fff; font-weight: bold; border: none; padding: 16px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; margin-top: 30px; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        .btn-run:hover { background: #059669; }
        .btn-run:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }
        #status { text-align: center; font-weight: bold; margin-top: 20px; font-size: 14px; }
        .success { color: #10b981; } .error { color: #ef4444; } .loading { color: #3b82f6; }
        .info-desc { font-size: 12px; color: #64748b; margin-top: 5px; }
    </style>

  <link rel="manifest" href="/kintaibeta/manifest.json">
  <meta name="theme-color" content="#0a84ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AutoKintai">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/kintaibeta/icon-192.png">
  <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/kintaibeta/sw.js').catch(()=>{});});}</script>
</head>
<body>

<div class="container">
    <h1>アイアール株式会社 勤務表自動作成ツール</h1>

    <div class="step-box">
        <span class="step-num">STEP 1</span>
        <label for="excelFile">会社指定の「勤務表Excel（空欄または元本）」を選択</label>
        <input type="file" id="excelFile" accept=".xlsx">
        <p class="info-desc">※元のレイアウトや数式、マクロを完全に保持したままデータを上書きします。</p>
    </div>

    <div class="step-box">
        <span class="step-num">STEP 2</span>
        <label for="pdfFile">マネーフォワードから出した「出勤簿PDF」を選択</label>
        <input type="file" id="pdfFile" accept="application/pdf">
        <p class="info-desc">※PDF内部に格納されている打刻・備考データを正確に自動抽出します。</p>
    </div>

    <button id="runBtn" class="btn-run" onclick="processFiles()" disabled>🚀 勤務表Excelを自動生成してダウンロード</button>
    <div id="status"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

const excelInput = document.getElementById('excelFile');
const pdfInput = document.getElementById('pdfFile');
const runBtn = document.getElementById('runBtn');
const statusDiv = document.getElementById('status');

// 両方のファイルが選択されたらボタンを有効化
[excelInput, pdfInput].forEach(input => {
    input.addEventListener('change', () => {
        runBtn.disabled = !(excelInput.files.length && pdfInput.files.length);
    });
});

async function processFiles() {
    showStatus('⏳ PDFデータを高度解析中...', 'loading');
    
    try {
        // 1. PDFからマネーフォワードの文字データを完全抽出
        const pdfFile = pdfInput.files[0];
        const pdfArrayBuffer = await pdfFile.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: pdfArrayBuffer }).promise;
        
        let rawText = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            // MFクラウドのPDF内部テキスト（CSV形式の埋め込み）を結合
            rawText += textContent.items.map(item => item.str).join("");
        }

        if (!rawText.includes("04/01")) {
            throw new Error("PDFから4月度のデータが見つかりませんでした。正しいMF出勤簿PDFか確認してください。");
        }

        // 勤怠データのマッピング用オブジェクト
        const kintaiData = {};
        for (let d = 1; d <= 30; d++) {
            kintaiData[d] = { start: null, end: null, rest: null, total: null, note: "" };
        }

        // 特殊なCSV型テキストを1行ずつバラして走査
        const lines = rawText.split(/[\r\n]+/);
        lines.forEach(line => {
            // クォーテーションや余分なスペースを掃除
            const cleanLine = line.replace(/["']/g, '').trim();
            if (/^04\/\d{2}/.test(cleanLine)) {
                const tokens = cleanLine.split(',').map(t => t.trim());
                const dayNum = parseInt(tokens[0].substring(3, 5), 10);
                
                // 時間トークン (hh:mm形式) の抽出
                const times = tokens.filter(t => /^\d{2}:\d{2}/.test(t)).map(t => t.substring(0, 5));
                
                // 備考の抽出（現場都合、自己都合など）
                const noteToken = tokens.find(t => t.includes("現場都合") || t.includes("自己都合")) || "";

                if (kintaiData[dayNum]) {
                    kintaiData[dayNum].note = noteToken;
                    
                    if (dayNum === 1) {
                        // 4/1 午後出勤イレギュラー対応
                        kintaiData[dayNum].start = "13:30:00";
                        kintaiData[dayNum].end = "17:30:00";
                        kintaiData[dayNum].rest = "00:00:00";
                        kintaiData[dayNum].total = "04:00:00";
                    } else if (times.length >= 2) {
                        kintaiData[dayNum].start = times[0] + ":00";
                        kintaiData[dayNum].end = times[1] + ":00";
                        kintaiData[dayNum].total = "08:00:00";
                        kintaiData[dayNum].rest = "01:00:00";
                    }
                }
            }
        });

        // 祝日・全休の強制補完
        if (kintaiData[29]) kintaiData[29].note = "昭和の日";
        if (kintaiData[30]) kintaiData[30].note = "現場都合による休業/全休";

        showStatus('⏳ 元のExcelを保持したままデータを注入中...', 'loading');

        // 2. ExcelJSを使って元のエクセルを破壊せずに上書き
        const excelFile = excelInput.files[0];
        const excelArrayBuffer = await excelFile.arrayBuffer();
        
        const workbook = new ExcelJS.Workbook();
        await workbook.xlsx.load(excelArrayBuffer);
        
        // 「打込み用」シート、なければ最初のシート
        const worksheet = workbook.getSheet('打込み用') || workbook.worksheets[0];

        // ヘッダー基本情報の書き込み（元のセルの位置へ）
        worksheet.getCell('J1').value = 2026;       # 年
        worksheet.getCell('K1').value = "4-01";     # 月分
        worksheet.getCell('D2').value = "○○建設株式会社";
        worksheet.getCell('M2').value = "○○施工管理業務";
        worksheet.getCell('D3').value = "○○作業所";
        worksheet.getCell('M3').value = "岩本 コナン";
        worksheet.getCell('F4').value = "08:30:00";
        worksheet.getCell('H4').value = "17:30:00";
        worksheet.getCell('K4').value = "08:00:00";
        worksheet.getCell('M4').value = 103228;

        // 明細行の書き込み（7行目＝4月1日 〜 36行目＝4月30日）
        const startRow = 7;
        for (let day = 1; day <= 30; day++) {
            const rowNum = startRow + day - 1;
            const data = kintaiData[day];

            // 日付を2026年に書き換え
            worksheet.getCell(`A${rowNum}`).value = `2026-04-${String(day).padStart(2, '0')}`;

            if (data.start && data.end) {
                worksheet.getCell(`D${rowNum}`).value = data.start; // 始業時間
                worksheet.getCell(`G${rowNum}`).value = data.end;   // 終業時間
                worksheet.getCell(`H${rowNum}`).value = data.rest;  # 休憩時間
                worksheet.getCell(`I${rowNum}`).value = data.total; # 労働時間
            }
            if (data.note) {
                worksheet.getCell(`O${rowNum}`).value = data.note;  # 備考
            }
        }

        // 3. ダウンロード処理
        const outBuffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([outBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `勤務表_202604_103228.xlsx`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showStatus('✨ 成功しました！自動転記されたExcelがダウンロードされました。', 'success');

    } catch (err) {
        showStatus('❌ エラーが発生しました: ' + err.message, 'error');
        console.error(err);
    }
}

function showStatus(msg, className) {
    statusDiv.innerText = msg;
    statusDiv.className = className;
}
</script>
</body>
</html>
